# BEGIN_KITTY_THEME
# Catppuccin-Frappe
include current-theme.conf
# END_KITTY_THEME
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
background_blur 1
background_opacity 0.75
map --allow-fallback ascii ctrl+c copy_to_clipboard
map --allow-fallback ascii ctrl+v paste_from_clipboard
